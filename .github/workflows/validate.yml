name: Validate PowerShell

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PSScriptAnalyzer
        uses: actions/cache@v4
        with:
          path: ~/.local/share/powershell/Modules/PSScriptAnalyzer
          key: psscriptanalyzer-${{ runner.os }}-v1

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
              Set-PSRepository PSGallery -InstallationPolicy Trusted
              Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning -ExcludeRule PSAvoidUsingWriteHost,PSUseSingularNouns
          if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) issue(s)"
          }
          Write-Host "PSScriptAnalyzer: All checks passed"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester Tests
        shell: pwsh
        run: |
          $result = Invoke-Pester tests/ -Output Detailed -PassThru
          if ($result.FailedCount -gt 0) {
              throw "Pester: $($result.FailedCount) test(s) failed"
          }

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Import all modules and load config
        shell: pwsh
        run: |
          foreach ($mod in Get-ChildItem modules/*.psm1) {
              Import-Module $mod.FullName -Force
              Write-Host "Imported: $($mod.Name)"
          }
          $config = Import-LabConfig -ConfigPath configs/commercial/basic-lab-demo.json
          Write-Host "Config loaded: $($config.labName) (prefix: $($config.prefix))"
          $valid = Test-LabConfigValidity -Config $config
          Write-Host "Config valid: $valid"
