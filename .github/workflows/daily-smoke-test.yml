name: Daily DLP Smoke Test

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 2 PM UTC (10 AM ET) weekdays
  workflow_dispatch:
    inputs:
      profile:
        description: 'Lab profile to test (leave blank for auto-discover — works against any Purview tenant)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - basic-lab
          - copilot-protection
          - shadow-ai

permissions:
  id-token: write
  contents: read

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    environment: commercial

    steps:
      - uses: actions/checkout@v6

      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module -Name Microsoft.Graph.Authentication -Force -Scope CurrentUser
          Install-Module -Name Microsoft.Graph.Users -Force -Scope CurrentUser

      - name: Azure login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Run DLP smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path logs -Force | Out-Null
          $transcriptPath = Join-Path 'logs' 'smoke-${{ github.run_id }}.log'
          $transcriptStarted = $false
          Start-Transcript -Path $transcriptPath -Force
          $transcriptStarted = $true

          try {
              $profile = '${{ github.event.inputs.profile }}'

              foreach ($mod in Get-ChildItem modules/*.psm1) {
                  Import-Module $mod.FullName -Force
              }

              if ([string]::IsNullOrWhiteSpace($profile)) {
                  # Auto-discover mode — tenant-agnostic, works against any Purview tenant
                  ./scripts/Invoke-SmokeTest.ps1 -Cloud commercial
              }
              else {
                  ./scripts/Invoke-SmokeTest.ps1 -LabProfile $profile -Cloud commercial
              }
          }
          finally {
              if ($transcriptStarted) {
                  Stop-Transcript | Out-Null
              }
          }

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-test-${{ github.run_id }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 30
